name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Remove Hardcoded Java Home for CI
        run: sed -i '/org.gradle.java.home/d' android/gradle.properties

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Decode Keystore
        continue-on-error: true
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > android/app/my-release-key.jks

      - name: Build Android APK (Release)
        continue-on-error: true
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Build Android AAB (Play Store)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Get Version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename and Zip APKs
        run: |
          VERSION=${{ steps.package-version.outputs.version }}
          # Debug APK
          cp android/app/build/outputs/apk/debug/app-debug.apk Anexo_Cobro_v${VERSION}_Debug.apk
          # Release APK (Optimized)
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk Anexo_Cobro_v${VERSION}_Optimized.apk
          fi
          # AAB (Play Store)
          if [ -f android/app/build/outputs/bundle/release/app-release.aab ]; then
            cp android/app/build/outputs/bundle/release/app-release.aab Anexo_Cobro_v${VERSION}_PlayStore.aab
          fi
          zip Anexo_Cobro_v${VERSION}_APK_Bundle.zip Anexo_Cobro_v${VERSION}_*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}-LATEST
          name: v${{ steps.package-version.outputs.version }} - Optimized for Samsung/Xiaomi
          body: |
            ### Anexo Cobro v${{ steps.package-version.outputs.version }} - Versión Optimizada
            
            **Mejoras de Rendimiento y Estabilidad:**
            - 🚀 **Optimizado para Samsung/Xiaomi**: Mejoras específicas para dispositivos de gama baja.
            - 📁 **Carga Local**: Ahora la app carga instantáneamente desde el dispositivo (evita cierres por red lenta).
            - 🛠️ **R8/ProGuard**: Código optimizado y comprimido para menor consumo de RAM.
            - 📊 **Excel Profesional**: Importación y exportación masiva funcional (45 columnas).
            - 🏠 **Interfaz Superior**: Modals y ventanas emergentes corregidas.
          files: |
            Anexo_Cobro_v${{ steps.package-version.outputs.version }}_Debug.apk
            Anexo_Cobro_v${{ steps.package-version.outputs.version }}_Optimized.apk
            Anexo_Cobro_v${{ steps.package-version.outputs.version }}_PlayStore.aab
            Anexo_Cobro_v${{ steps.package-version.outputs.version }}_APK_Bundle.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: anexo-cobro-v${{ steps.package-version.outputs.version }}-debug
          path: Anexo_Cobro_v${{ steps.package-version.outputs.version }}_Debug.apk

      - name: Upload AAB Play Store (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: anexo-cobro-v${{ steps.package-version.outputs.version }}-playstore-aab
          path: Anexo_Cobro_v${{ steps.package-version.outputs.version }}_PlayStore.aab
