<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Anexo Cobro v6.8.0-STABLE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script>
    // SECURITY ALIAS: Prevents "handleSync is not defined" from legacy cached components
    window.handleSync = function() {
      console.warn("Legacy handleSync called. Redirecting to global force sync...");
      if (window._triggerForceSync) {
        window._triggerForceSync();
      } else {
        console.error("Force sync trigger not yet initialized.");
      }
    };
  </script>

  <!-- Prevent Caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <!-- VERSION_V5_2_0_FORCE_REDEPLOY -->
  <div id="error-trap"
    style="display:none; color:red; padding:20px; font-family:monospace; background:white; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999;">
  </div>


  <script>
    // --- MECANISMO DE RECUPERACIÓN (Anti-Pantalla en Blanco) ---
    (function () {
      const BOOT_TIMEOUT = 15000;
      let bootFinished = false;

      window.addEventListener('load', () => {
        setTimeout(() => {
          bootFinished = true;
          console.log("Sistema cargado establemente.");
        }, BOOT_TIMEOUT);
      });

      const handlePanic = (msg) => {
        // Ignorar errores transitorios o de ServiceWorker que no impiden el funcionamiento
        const isTransient = /signal is aborted|AbortError|Failed to fetch|network error|ServiceWorker|script error/i.test(msg);
        if (isTransient) return;

        console.error("Error crítico detectado:", msg);
        var trap = document.getElementById('error-trap');
        if (trap) {
          trap.style.display = 'block';
          trap.innerHTML = 
            '<div style="background:#0f172a; color:white; height:100vh; padding:20px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif;">' +
              '<h1 style="font-size:60px; margin:0;">🛠️</h1>' +
              '<h2 style="font-size:20px; font-weight:bold; margin:10px 0; color:#f1f5f9;">SISTEMA EN REPARACIÓN</h2>' +
              '<p style="color:#94a3b8; margin-bottom:20px; font-size:14px; max-width:300px;">La app detectó un problema técnico. Pulsa abajo para resetearla.</p>' +
              '<div style="background:#1e293b; padding:15px; border-radius:12px; border:1px solid #334155; width:100%; max-width:400px; margin-bottom:20px; text-align:left;">' +
                '<p style="color:#ef4444; font-size:10px; font-weight:bold; text-transform:uppercase; margin:0 0 5px 0;">Error:</p>' +
                '<pre style="font-size:10px; color:#cbd5e1; margin:0; white-space:pre-wrap; word-break:break-all; max-height:200px; overflow:auto;">' + msg + '</pre>' +
              '</div>' +
              '<button onclick="localStorage.clear(); sessionStorage.clear(); window.location.reload(true);" ' +
                'style="background:linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color:white; padding:18px 36px; border-radius:20px; font-weight:bold; border:none; cursor:pointer; box-shadow:0 10px 20px -5px rgba(59,130,246,0.6); font-size:15px;">' +
                'REPARAR AHORA' +
              '</button>' +
            '</div>';
        }
      };

      window.addEventListener('error', (e) => {
        handlePanic(e.message || 'Error Desconocido');
      });
      window.addEventListener('unhandledrejection', (e) => {
        const msg = e.reason?.message || e.reason || "Error Promesa";
        handlePanic(msg.toString());
      });
    })();
  </script>
  <div id="root"></div>
  <script>
    // Parche preventivo para bases de datos corruptas
    (function() {
      if (!localStorage.getItem('db_clear_v4')) {
        localStorage.setItem('db_clear_v4', 'true');
        indexedDB.deleteDatabase('_ionickv');
      }
    })();
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
